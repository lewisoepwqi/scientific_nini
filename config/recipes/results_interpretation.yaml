recipe_id: results_interpretation
name: 结果解读与下一步建议
summary: 将已有结果整理成主要发现、可能解释、局限性和下一步动作。
scenario: 适合分析完成后撰写结果讨论、准备汇报或组织结论。
example_input: 我已经做完差异分析和回归，请帮我解读结果并给出下一步实验建议。
recommended_triggers:
  - 结果解读
  - 结果解释
  - 讨论部分
  - 下一步建议
deep_task_keywords:
  - 解读
  - 讨论
  - 建议
input_fields:
  - key: main_result
    label: 主要结果
    required: true
    placeholder: 例如：干预组 IL-6 显著下降，P<0.01
    example: 干预组 IL-6 显著下降，P<0.01
  - key: comparison
    label: 对照关系
    required: false
    placeholder: 例如：干预组 vs 对照组
    example: 干预组 vs 对照组
  - key: concern
    label: 当前疑问
    required: false
    placeholder: 例如：结果是否足够支持机制推断
    example: 结果是否足够支持机制推断
steps:
  - id: summarize
    title: 抽取主要发现
    description: 整理关键结果、比较关系和统计信号。
  - id: interpret
    title: 建立解释框架
    description: 给出可能机制、替代解释和证据强弱判断。
  - id: next
    title: 输出结论与下一步
    description: 形成讨论段落提纲、局限性和后续实验建议。
default_outputs:
  - id: discussion
    label: 讨论提纲
    type: markdown
  - id: next-step
    label: 下一步建议
    type: checklist
recovery:
  max_retries: 1
  user_hint: 如果缺少核心结果，请先补充比较对象、效应方向和显著性信息。
  fallback_action: 请求用户补充核心结果
starter_prompt_template: |
  你正在以 Recipe 模式执行「{recipe_name}」。

  用户原始请求：
  {user_request}

  用户补充输入：
  {input_bullets}

  请按以下步骤推进：
  {step_bullets}

  默认输出：
  {output_bullets}

  输出时请明确区分“数据支持的发现”和“合理但待验证的推断”。
  若流程受阻，请遵循以下恢复提示：{fallback_hint}
