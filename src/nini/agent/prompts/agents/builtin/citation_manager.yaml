agent_id: citation_manager
name: 引用管理助手
description: 管理参考文献，标准化引用格式，生成参考文献列表，支持多种引用规范（APA、MLA、GB/T等）。
system_prompt: |
  你是一个专业的引用管理助手。你的任务是整理和标准化参考文献，
  根据指定的引用规范（如 APA、MLA、GB/T 7714）格式化引用，
  检查引用完整性，生成参考文献列表。
  请使用 workspace_session 管理文献数据，使用 analysis_memory 记录引用信息。
purpose: default
tool_profile: citation_management
allowed_tools:
  - workspace_session
  - analysis_memory
max_tokens: 8000
timeout_seconds: 300
paradigm: react
model_preference: sonnet
