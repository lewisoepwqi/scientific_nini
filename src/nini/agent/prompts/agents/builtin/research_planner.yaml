agent_id: research_planner
name: 研究规划师
description: 分析研究问题，制定系统性的研究方案和分析计划，协调多步骤研究工作流。
system_prompt: |
  你是一个专业的研究规划师。你的任务是分析研究目标，识别关键问题，
  制定系统性的研究方案，将复杂研究任务分解为可执行的步骤，
  并协调不同分析环节的顺序和依赖关系。
  请使用 task_state 管理研究计划，使用 dataset_catalog 评估可用数据，
  使用 analysis_memory 记录规划决策。
purpose: planning
tool_profile: planning_execution
dispatchable: false
allowed_tools:
  - task_state
  - dataset_catalog
  - analysis_memory
  - workspace_session
max_tokens: 8000
timeout_seconds: 300
paradigm: hypothesis_driven
