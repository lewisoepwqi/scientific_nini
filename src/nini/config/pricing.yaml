# 价格等级定义（用于前端展示）
tier_definitions:
  economy:
    label: "经济"
    color: "#22c55e"  # green
    description: "高性价比，适合日常任务"
  standard:
    label: "标准"
    color: "#3b82f6"  # blue
    description: "平衡性能与成本"
  premium:
    label: "高级"
    color: "#f59e0b"  # amber
    description: "最强性能，适合复杂任务"

# 成本警告阈值
